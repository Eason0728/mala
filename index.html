<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap');
:root{
  --bg:#fafaf8;--surface:#ffffff;--border:#e8e6e0;--border2:#d4d0c8;
  --text:#1a1a18;--text2:#5a5850;--text3:#9a9890;
  --safe-bottom:env(safe-area-inset-bottom,0px);
  /* 攤車庫存 - 橄欖綠 */
  --c1:#3d5a3e;--c1b:#4a6e4b;--c1bg:#f0f4f0;--c1light:#e4ede4;--c1mid:#c8dac8;
  /* 現場庫存 - 赭土橘 */
  --c2:#7a4020;--c2b:#8f4d28;--c2bg:#faf4f0;--c2light:#f5e8e0;--c2mid:#e8cdb8;
  /* 商品管理 - 石板藍 */
  --c3:#2d4a6b;--c3b:#385a82;--c3bg:#f0f4f8;--c3light:#e0eaf4;--c3mid:#b8ceea;
  /* 列印 - 中性深 */
  --c4:#2a2a28;--c4b:#3a3a38;--c4bg:#f4f4f2;--c4light:#ebebea;
  --accent:#e8702a;--red:#c0392b;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;font-size:15px;overscroll-behavior:none}
#app{display:flex;flex-direction:column;height:100dvh}

/* ── Header ── */
header{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;flex-shrink:0;display:flex;align-items:center;gap:12px}
.logo-wrap{flex-shrink:0}
.logo-wrap img{height:48px;width:auto;display:block;object-fit:contain;max-width:120px}
.header-info{flex:1;min-width:0}
.brand-sub{font-size:10px;color:var(--text3);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:2px}
.brand-name{font-size:15px;font-weight:700;color:var(--text);letter-spacing:0.02em}
.total-badge{background:var(--text);color:var(--surface);font-family:'DM Mono',monospace;font-size:12px;font-weight:500;padding:5px 11px;border-radius:6px;flex-shrink:0;letter-spacing:0.02em}

/* ── Tabs ── */
.tab-bar{display:grid;grid-template-columns:repeat(4,1fr);background:var(--surface);border-bottom:2px solid var(--border);flex-shrink:0}
.tab-btn{background:none;border:none;color:var(--text3);font-family:'Noto Sans TC',sans-serif;font-size:11px;font-weight:500;padding:10px 4px 8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .15s;letter-spacing:0.02em}
.tab-btn .ti{font-size:16px}
.tab-btn[data-tab=cart].active{color:var(--c1);border-bottom-color:var(--c1)}
.tab-btn[data-tab=stock].active{color:var(--c2);border-bottom-color:var(--c2)}
.tab-btn[data-tab=price].active{color:var(--c3);border-bottom-color:var(--c3)}
.tab-btn[data-tab=print].active{color:var(--c4);border-bottom-color:var(--c4)}

/* ── Content ── */
.tab-content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(20px + var(--safe-bottom))}
.page{display:none}
.page.active{display:block}

/* ── Section headers by tab ── */
.sec-wrap{margin:14px 14px 0}
.sec-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:0}
.sec-hdr{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--border)}

/* Cart sections */
#page-cart .sec-hdr{background:var(--c1light)}
#page-cart .sec-total{color:var(--c1b)}
/* Stock sections */
#page-stock .sec-hdr{background:var(--c2light)}
#page-stock .sec-total{color:var(--c2b)}
/* Price sections */
#page-price .sec-hdr{background:var(--c3light)}
#page-price .sec-total{color:var(--c3b)}

.sec-title-inp{background:transparent;border:none;color:var(--text);font-family:'Noto Sans TC',sans-serif;font-size:13px;font-weight:700;flex:1;min-width:0;letter-spacing:0.04em}
.sec-title-inp:focus{outline:none}
.sec-total{font-family:'DM Mono',monospace;font-size:12px;font-weight:500;white-space:nowrap}
.sec-del{background:none;border:none;color:var(--text3);font-size:15px;cursor:pointer;padding:2px 4px;line-height:1}

/* ── Item Row (攤車/庫存) ── */
.item-row{display:flex;align-items:flex-start;padding:10px 14px;border-bottom:1px solid var(--border);gap:10px}
.item-row:last-child{border-bottom:none}
.item-left{flex:1;min-width:0;display:flex;flex-direction:column;gap:5px}
.item-name-inp{background:transparent;border:none;border-bottom:1px solid var(--border2);color:var(--text);font-family:'Noto Sans TC',sans-serif;font-size:14px;font-weight:500;padding:2px 0 4px;width:100%}
.item-name-inp:focus{outline:none;border-bottom-color:var(--accent)}
.item-sub-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.sub-lbl{font-size:11px;color:var(--text3);white-space:nowrap}
.spec-inp{background:var(--bg);border:1px solid var(--border2);border-radius:5px;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;padding:3px 6px;text-align:center}
.spec-inp:focus{outline:none;border-color:var(--accent)}
.unit-tag{font-size:11px;color:var(--text2);background:var(--border);padding:2px 7px;border-radius:12px;white-space:nowrap;font-family:'DM Mono',monospace}
.item-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.num-inp{background:var(--bg);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:'DM Mono',monospace;font-size:16px;font-weight:500;text-align:center;padding:6px 0;width:72px;height:38px;-webkit-appearance:none;appearance:none}
.num-inp:focus{outline:none;border-color:var(--accent)}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
.unit-lbl{font-size:10px;color:var(--text3);text-align:right}
.item-val{font-family:'DM Mono',monospace;font-size:12px;font-weight:500;min-width:72px;text-align:right;color:var(--text2)}
.item-val.zero{color:var(--text3)}
#page-cart .item-val:not(.zero){color:var(--c1b)}
#page-stock .item-val:not(.zero){color:var(--c2b)}
/* ── Collapsible inventory section ── */
.sec-body{overflow:hidden;transition:max-height .25s ease}
.sec-body.collapsed{max-height:0!important}
.sec-toggle{background:none;border:none;color:var(--text3);font-size:13px;cursor:pointer;padding:2px 6px;line-height:1;transition:transform .2s;flex-shrink:0}
.sec-toggle.collapsed{transform:rotate(-90deg)}
.item-del:active{opacity:1}

/* ── Add row ── */
.add-item-row{padding:9px 14px;border-top:1px dashed var(--border2);display:flex;gap:8px;align-items:center}
.add-item-inp{flex:1;background:var(--bg);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-size:13px;padding:7px 10px}
.add-item-inp:focus{outline:none;border-color:var(--accent)}
.add-cat-bar{padding:12px 14px;display:flex;gap:8px;margin-top:4px}
.add-cat-inp{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;padding:8px 12px}
.add-cat-inp:focus{outline:none;border-color:var(--accent)}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;gap:5px;border:none;border-radius:8px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;font-weight:700;font-size:12px;padding:7px 13px;transition:all .15s;white-space:nowrap;letter-spacing:0.02em}
.btn-cart{background:var(--c1);color:#fff}
.btn-stock{background:var(--c2);color:#fff}
.btn-price{background:var(--c3);color:#fff}
.btn-print{background:var(--c4);color:#fff}
.btn-outline{background:transparent;border:1px solid var(--border2);color:var(--text2)}
.btn-sm{padding:5px 10px;font-size:11px}
.btn-danger{background:transparent;border:1px solid var(--red);color:var(--red);padding:4px 8px;font-size:11px;border-radius:5px;cursor:pointer;font-weight:700}

/* ── Price Table ── */
.ptw{overflow-x:auto}
.pt{width:100%;border-collapse:collapse;font-size:12px}
.pt th{background:var(--c3bg);color:var(--text2);font-weight:700;padding:8px 10px;text-align:left;letter-spacing:.04em;white-space:nowrap;border-bottom:1px solid var(--border)}
.pt td{padding:7px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
.pt tr:last-child td{border-bottom:none}
.pt td.cmp{color:var(--c3b);font-family:'DM Mono',monospace;font-size:12px;font-weight:500}
.pt input{background:var(--bg);border:1px solid var(--border);border-radius:5px;color:var(--text);font-size:12px;padding:4px 6px;width:100%;font-family:'DM Mono',monospace}
.pt input:focus{outline:none;border-color:var(--c3)}
.add-form{padding:12px 14px;background:var(--c3bg);border-top:1px solid var(--border);display:flex;flex-direction:column;gap:8px}
.add-form-row{display:flex;gap:8px;flex-wrap:wrap}
.add-form label{font-size:10px;color:var(--text3);margin-bottom:3px;display:block;letter-spacing:0.04em;text-transform:uppercase}
.add-form .field{flex:1;min-width:90px}
.add-form input{background:var(--surface);border:1px solid var(--border2);border-radius:7px;color:var(--text);font-size:13px;padding:7px 9px;width:100%}
.add-form input:focus{outline:none;border-color:var(--c3)}
.add-form-title{font-size:11px;font-weight:700;color:var(--c3);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:4px}

/* ── 列印頁 ── */
.sum-top{margin:14px 14px 0;padding:20px;background:var(--surface);border:1px solid var(--border);border-radius:12px;text-align:center}
.sum-top-lbl{font-size:10px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase}
.sum-top-num{font-family:'DM Mono',monospace;font-size:34px;font-weight:400;color:var(--text);margin-top:6px}

/* ── 列印頁：分類小計卡片 ── */
.subtotal-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:14px 14px 0}
.subtotal-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 12px;text-align:center}
.subtotal-card.food{border-top:3px solid var(--c1)}
.subtotal-card.pack{border-top:3px solid var(--c2)}
.subtotal-card.total{border-top:3px solid var(--c4)}
.subtotal-card-lbl{font-size:10px;color:var(--text3);letter-spacing:.06em;line-height:1.4}
.subtotal-card-num{font-family:'DM Mono',monospace;font-size:18px;font-weight:700;color:var(--text);margin-top:5px}
.subtotal-card.food .subtotal-card-num{color:var(--c1)}
.subtotal-card.pack .subtotal-card-num{color:var(--c2)}
.subtotal-card.total .subtotal-card-num{color:var(--c4)}
.subtotal-card-sub{font-size:9px;color:var(--text3);margin-top:3px;line-height:1.4}
@media print{
  .subtotal-grid{display:grid!important;grid-template-columns:repeat(3,1fr)!important;gap:8px!important;margin:0 0 10px 0!important}
  .subtotal-card{border-radius:6px;padding:10px 8px}
  .subtotal-card-num{font-size:16px}
}
.sum-row{display:flex;justify-content:space-between;align-items:center;padding:9px 14px;border-bottom:1px solid var(--border)}
.sum-row:last-child{border-bottom:none}
.sum-row-name{font-size:12px;color:var(--text2)}
.sum-row-val{font-family:'DM Mono',monospace;font-size:13px;color:var(--text)}
.sum-row-val.hi{font-weight:700}
.sum-item-name{font-size:12px;color:var(--text3);padding-left:10px}
.sum-qty{font-size:11px;color:var(--text2);font-family:'DM Mono',monospace;letter-spacing:0.02em}
.store-name-bar{display:flex;align-items:center;gap:10px;padding:12px 14px 0}
.store-name-bar label{font-size:11px;font-weight:700;color:var(--text2);white-space:nowrap;letter-spacing:0.04em}
.store-name-inp{flex:1;background:var(--surface);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:'Noto Sans TC',sans-serif;font-size:14px;font-weight:700;padding:8px 12px}
.store-name-inp:focus{outline:none;border-color:var(--accent)}
@media print{.store-name-bar{display:none!important}}
.action-bar{padding:14px;display:flex;gap:8px;flex-wrap:wrap}

/* ── Modal ── */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:flex;align-items:flex-end;justify-content:center}
.mo.hidden{display:none}
.mo-box{background:var(--surface);border-radius:16px 16px 0 0;padding:24px;width:100%;max-width:480px}
.mo-title{font-size:15px;font-weight:700;margin-bottom:8px}
.mo-sub{font-size:13px;color:var(--text3)}
.mo-btns{display:flex;gap:10px;margin-top:16px}
.mo-btns .btn{flex:1;justify-content:center}

/* ── Snack ── */
#snack{position:fixed;bottom:calc(70px + var(--safe-bottom));left:50%;transform:translateX(-50%) translateY(16px);background:var(--text);color:var(--surface);font-size:13px;padding:9px 18px;border-radius:20px;opacity:0;transition:all .22s;pointer-events:none;white-space:nowrap;z-index:999}
#snack.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── Category color grades ── */
#page-cart .sec-card:nth-child(1) .sec-hdr{background:var(--c1light)}
#page-cart .sec-card:nth-child(2) .sec-hdr{background:#dde8dd}
#page-cart .sec-card:nth-child(3) .sec-hdr{background:#d0dfd0}
#page-cart .sec-card:nth-child(n+4) .sec-hdr{background:#c5d7c5}
#page-stock .sec-card:nth-child(1) .sec-hdr{background:var(--c2light)}
#page-stock .sec-card:nth-child(2) .sec-hdr{background:#f0e0d4}
#page-stock .sec-card:nth-child(3) .sec-hdr{background:#ead4c0}
#page-stock .sec-card:nth-child(4) .sec-hdr{background:#e4ccb4}
#page-stock .sec-card:nth-child(5) .sec-hdr{background:#dcc4a8}
#page-stock .sec-card:nth-child(n+6) .sec-hdr{background:#d4bc9c}
#page-price .sec-card:nth-child(1) .sec-hdr{background:var(--c3light)}
#page-price .sec-card:nth-child(2) .sec-hdr{background:#d4e2f0}
#page-price .sec-card:nth-child(3) .sec-hdr{background:#c8d8ec}
#page-price .sec-card:nth-child(n+4) .sec-hdr{background:#bccee8}

/* ── Print ── */
.ph{display:none}.pm{display:none}
@media print{
  *{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  body{background:#fff!important;color:#000!important;font-size:10pt}
  #app{height:auto}
  header,.tab-bar,.action-bar,#snack,.mo{display:none!important}
  .tab-content{overflow:visible}
  .page{display:none!important}
  .page#page-print{display:block!important}
  .sec-wrap,.sec-card,.sum-top{page-break-inside:avoid}
  .ph{display:block!important;text-align:center;padding:12px 0 6px;font-size:16pt;font-weight:700;border-bottom:2px solid #000;margin-bottom:10px}
  .pm{display:block!important;text-align:center;font-size:9pt;color:#666;margin-bottom:14px}
}
.empty-hint{padding:18px;text-align:center;color:var(--text3);font-size:13px}

/* ── 異常通知 ── */
.alert-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:2px 7px;border-radius:10px;white-space:nowrap}
.alert-badge.low{background:#fde8e8;border:1px solid var(--red);color:var(--red)}
.alert-badge.high{background:#fff3cd;border:1px solid #d48a00;color:#7a5200}
.alert-dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}
.sum-row.has-alert-low{background:#fff5f5}
.sum-row.has-alert-high{background:#fffbf0}
.sum-row.has-alert-missing{background:#fdf4ff}
.alert-badge.missing{background:#f3e8ff;border:1px solid #9b59b6;color:#6c3483}
.alert-summary-bar{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:10px;margin:14px 14px 0;font-size:13px;font-weight:700}
.alert-summary-bar.has-alert{background:#fdf0f0;border:1px solid var(--red);color:var(--red)}
.alert-summary-bar.clean{background:#f0f6f0;border:1px solid #7ec87a;color:#3d6e40}

/* 設定面板 */
.threshold-panel{background:var(--surface);border:1px solid var(--border);border-radius:12px;margin:14px 14px 0;overflow:hidden}
.threshold-panel-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--c4bg);border-bottom:1px solid var(--border);cursor:pointer;user-select:none}
.threshold-panel-title{font-size:12px;font-weight:700;color:var(--text2);letter-spacing:0.06em;text-transform:uppercase}
.threshold-panel-body{display:none;padding:0}
.threshold-panel-body.open{display:block}
.thresh-cat-hdr{padding:8px 14px 5px;background:var(--c4bg);font-size:11px;font-weight:700;color:var(--text3);letter-spacing:0.06em;text-transform:uppercase;border-bottom:1px solid var(--border)}
.thresh-row{display:flex;align-items:center;gap:6px;padding:8px 14px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.thresh-row:last-child{border-bottom:none}
.thresh-name{font-size:13px;color:var(--text);width:100%;margin-bottom:3px;font-weight:500}
.thresh-lbl{font-size:11px;color:var(--text3);white-space:nowrap}
.thresh-inp{background:var(--bg);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-family:'DM Mono',monospace;font-size:13px;padding:4px 8px;width:82px;text-align:right}
.thresh-inp:focus{outline:none;border-color:var(--c4)}
.thresh-sep{width:100%;height:0;border:none}
.thresh-tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:8px;white-space:nowrap}
.thresh-tag.low{background:#fde8e8;color:var(--red)}
.thresh-tag.high{background:#fff3cd;color:#7a5200}

@media print{
  .threshold-panel{display:none!important}
  .alert-summary-bar{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .alert-badge{-webkit-print-color-adjust:exact;print-color-adjust:exact}
}
</style>

function applyDefaultThresholds(){
  if(!S.thresholds||typeof S.thresholds!=='object')S.thresholds={};
  // 只補「從未出現過」的品項；已存在的 key（含 {low:null,high:null}＝使用者明確清除）一律保留
  Object.keys(DEF_THRESH_DEFAULTS).forEach(k=>{
    if(!(k in S.thresholds)){const d=DEF_THRESH_DEFAULTS[k];S.thresholds[k]={low:d.low,high:d.high};}
  });
}
function load(){
  try{const v=localStorage.getItem('mala_v5');S=v?JSON.parse(v):JSON.parse(JSON.stringify(DEF));}
  catch(e){S=JSON.parse(JSON.stringify(DEF));}
  // 結構防呆：欄位缺失的歷史壞資料自動補齊，初始化不再因單一欄位缺失而中斷
  if(!S.products||typeof S.products!=='object')S.products=JSON.parse(JSON.stringify(DEF.products));
  if(!Array.isArray(S.cartCats))S.cartCats=[];
  if(!Array.isArray(S.stockCats))S.stockCats=[];
  if(!S.cartItems||typeof S.cartItems!=='object')S.cartItems={};
  if(!S.stockItems||typeof S.stockItems!=='object')S.stockItems={};
  // 補齊缺少的預設閾值（僅限從未出現過的 key）
  applyDefaultThresholds();
  // 確保 DEF 裡的分類都存在（版本升級遷移）
  DEF.cartCats.forEach(c=>{if(!(S.cartCats||[]).includes(c)){S.cartCats=S.cartCats||[];S.cartCats.push(c);}});
  DEF.stockCats.forEach(c=>{if(!(S.stockCats||[]).includes(c)){S.stockCats=S.stockCats||[];S.stockCats.push(c);}});
  (S.cartCats||[]).forEach(c=>{if(!S.cartItems[c])S.cartItems[c]=[];});
  (S.stockCats||[]).forEach(c=>{if(!S.stockItems[c])S.stockItems[c]=[];});
}
function save(){localStorage.setItem('mala_v5',JSON.stringify(S));}
// 門市名稱納入 S，才會一起存檔＋匯出＋匯入（S 是 let，行內事件抓不到，需經此全域函式）
function setStoreNameLive(v){S.storeName=v;}      // oninput：每鍵只更新記憶體，匯出隨時是最新值
function setStoreName(v){S.storeName=v;save();}   // onchange：離開欄位才寫入 localStorage
function restoreStoreName(){const el=document.getElementById('store-name');if(el)el.value=S.storeName||'';}

// ── 計算 ──
function pgForProduct(p){
  const eff=p.spec;
  return eff>0?p.price/eff:p.price;
}
function itemValue(item,mode){
  // find product by pid
  const p=findProduct(item.pid);
  if(!p)return 0;
  const pg=pgForProduct(p);
  const spec=parseFloat(item.spec)||1;
  const qty=parseFloat(item.qty)||0;
  return qty*spec*pg;
}
function findProduct(pid){
  for(const c in S.products){
    const f=(S.products[c]||[]).find(p=>p.id===pid);
    if(f)return f;
  }
  return null;
}
function allProducts(){
  const list=[];
  for(const c in S.products)(S.products[c]||[]).forEach(p=>list.push(p));
  return list;
}
function fmt(n){return '$'+Math.round(n).toLocaleString();}
function fmtpg(n){
  if(n>=1)return n.toFixed(2);
  return n.toFixed(4);
}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5);}
// HTML 逸出：使用者可自訂的文字（品名、分類名）插入 innerHTML 前必須經過此函式
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
// 匯出檔名共用邏輯：門市名稱（過濾檔名非法字元）＋ 庫存管理 ＋ YYYYMMDD；三個匯出入口共用
function exportBaseName(now){
  const store=(S.storeName||'').trim().replace(/[\\\/:*?"<>|]/g,'');
  const d=now.getFullYear()+String(now.getMonth()+1).padStart(2,'0')+String(now.getDate()).padStart(2,'0');
  return (store?store+'_':'')+'庫存管理'+d;
}
function grandTotal(){
  let t=0;
  (S.cartCats||[]).forEach(c=>(S.cartItems[c]||[]).forEach(i=>t+=itemValue(i,'cart')));
  (S.stockCats||[]).forEach(c=>(S.stockItems[c]||[]).forEach(i=>t+=itemValue(i,'stock')));
  return t;
}
function updateHeaderTotal(){document.getElementById('header-total').textContent=fmt(grandTotal());}

// ── Tab ──
function switchTab(t){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+t).classList.add('active');
  document.getElementById('tab-'+t).classList.add('active');
  if(t==='print')renderPrint();
}

// 攤車庫存 & 現場庫存（共用邏輯）
// ════════════════════════════════════════
function renderCart(){buildInventoryPage('cart','page-cart',S.cartCats,S.cartItems);}
function renderStock(){buildInventoryPage('stock','page-stock',S.stockCats,S.stockItems);}

function buildInventoryPage(mode,pageId,cats,items){
  const page=document.getElementById(pageId);
  page.innerHTML='';
  cats.forEach(cat=>{
    page.appendChild(makeInvSec(mode,cat,items[cat]||[]));
  });
  const bar=document.createElement('div');
  bar.className='add-cat-bar';
  const btnCls=mode==='cart'?'btn-cart':'btn-stock';
  bar.innerHTML=`<input class="add-cat-inp" type="text" placeholder="新分類名稱" id="${mode}-new-cat"><button class="btn ${btnCls} btn-sm" onclick="addCat('${mode}')">＋ 新增分類</button>`;
  page.appendChild(bar);
  updateHeaderTotal();
}

function makeInvSec(mode,cat,items){
  const total=items.reduce((s,i)=>s+itemValue(i,mode),0);
  const sec=document.createElement('div');
  sec.className='sec-wrap';
  const card=document.createElement('div');
  card.className='sec-card';
  card.id=`sec-${mode}-${cat}`;
  // header
  const hdr=document.createElement('div');
  hdr.className='sec-hdr';
  hdr.innerHTML=`<button class="sec-toggle" id="tog-${mode}-${cat}" onclick="toggleInvSec('${mode}','${cat}')">▼</button><input class="sec-title-inp" value="【${cat}】" onblur="renameCat('${mode}','${cat}',this)" onfocus="this.select()"><div class="sec-total" id="${mode}-ct-${cat}">${fmt(total)}</div><button class="sec-del" onclick="askDelCat('${mode}','${cat}')">✕</button>`;
  card.appendChild(hdr);
  // collapsible body
  const body=document.createElement('div');
  body.className='sec-body';
  body.id=`body-${mode}-${cat}`;
  items.forEach(item=>body.appendChild(makeInvRow(mode,cat,item)));
  // add item row
  const ar=document.createElement('div');
  ar.className='add-item-row';
  ar.innerHTML=makeProductSelect(mode,cat);
  body.appendChild(ar);
  card.appendChild(body);
  // set initial max-height after append (use a large enough value)
  requestAnimationFrame(()=>{
    if(!body.classList.contains('collapsed')){
      body.style.maxHeight=body.scrollHeight+'px';
    }
  });
  sec.appendChild(card);
  return sec;
}

function makeProductSelect(mode,cat){
  const btnCls=mode==='cart'?'btn-cart':'btn-stock';
  // 若分類名稱在商品管理中有對應的同名分類，則只顯示該分類商品
  // 若為「拼盤燙炸」，則合併蔬菜、火鍋料、常溫食材三個分類的商品
  let products;
  const PINPAN_CATS=['蔬菜','火鍋料','常溫食材'];
  if(cat==='拼盤燙炸'){
    products=PINPAN_CATS.flatMap(c=>S.products[c]||[]);
  } else if(S.products[cat]!==undefined){
    products=(S.products[cat]||[]);
  } else {
    products=allProducts();
  }
  const opts=products.map(p=>`<option value="${p.id}">${p.name} (${p.unit})</option>`).join('');
  return `<select style="flex:1;background:var(--bg);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-size:12px;padding:7px 8px" id="selp-${mode}-${cat}"><option value="">選擇商品...</option>${opts}</select><button class="btn ${btnCls} btn-sm" onclick="addInvItem('${mode}','${cat}')">＋</button>`;
}

function makeInvRow(mode,cat,item){
  const p=findProduct(item.pid);
  const unit=p?p.unit:'—';
  const val=itemValue(item,mode);
  const row=document.createElement('div');
  row.className='item-row';
  row.id=`ir-${mode}-${item.id}`;
  row.innerHTML=`
    <div class="item-left">
      <input class="item-name-inp" type="text" value="${item.name}" onblur="updateInvMeta('${mode}','${cat}','${item.id}','name',this.value)">
      <div class="item-sub-row">
        <span class="sub-lbl">規格</span>
        <input class="spec-inp" type="number" inputmode="decimal" value="${item.spec||1}" style="width:64px" oninput="updateInvMeta('${mode}','${cat}','${item.id}','spec',this.value)">
        <span class="unit-tag">${unit}</span>
      </div>
    </div>
    <div class="item-right">
      <input class="num-inp" type="number" inputmode="decimal" min="0" step="1" value="${item.qty||''}" placeholder="0" oninput="updateInvQty('${mode}','${cat}','${item.id}',this.value)">
      <div class="unit-lbl">數量</div>
      <div class="item-val${val===0?' zero':''}" id="iv-${mode}-${item.id}">${val>0?fmt(val):'—'}</div>
    </div>
    <button class="item-del" onclick="delInvItem('${mode}','${cat}','${item.id}')">🗑</button>`;
  return row;
}

function addInvItem(mode,cat){
  const sel=document.getElementById(`selp-${mode}-${cat}`);
  const pid=sel.value;
  if(!pid){showSnack('請選擇商品');return;}
  const p=findProduct(pid);
  if(!p)return;
  const items=mode==='cart'?S.cartItems:S.stockItems;
  if(!items[cat])items[cat]=[];
  const id=uid();
  items[cat].push({id,pid,name:p.name,spec:p.spec,qty:0});
  save();
  sel.value='';
  reRenderInvSec(mode,cat);
  showSnack('已新增：'+p.name);
}

function updateInvQty(mode,cat,id,val){
  const items=mode==='cart'?S.cartItems[cat]:S.stockItems[cat];
  const item=items&&items.find(i=>i.id===id);
  if(!item)return;
  item.qty=parseFloat(val)||0;
  save();
  const v=itemValue(item,mode);
  const el=document.getElementById('iv-'+mode+'-'+id);
  if(el){el.textContent=v>0?fmt(v):'—';el.className='item-val'+(v>0?'':' zero');}
  refreshInvCatTotal(mode,cat);
  updateHeaderTotal();
}

function updateInvMeta(mode,cat,id,field,val){
  const items=mode==='cart'?S.cartItems[cat]:S.stockItems[cat];
  const item=items&&items.find(i=>i.id===id);
  if(!item)return;
  if(field==='name')item.name=val;
  else item.spec=parseFloat(val)||1;
  save();
  const v=itemValue(item,mode);
  const el=document.getElementById('iv-'+mode+'-'+id);
  if(el){el.textContent=v>0?fmt(v):'—';el.className='item-val'+(v>0?'':' zero');}
  refreshInvCatTotal(mode,cat);
  updateHeaderTotal();
}

function delInvItem(mode,cat,id){
  const ref=mode==='cart'?S.cartItems:S.stockItems;
  ref[cat]=(ref[cat]||[]).filter(i=>i.id!==id);
  save();reRenderInvSec(mode,cat);updateHeaderTotal();showSnack('已刪除品項');
}

function refreshInvCatTotal(mode,cat){
  const items=mode==='cart'?(S.cartItems[cat]||[]):(S.stockItems[cat]||[]);
  const t=items.reduce((s,i)=>s+itemValue(i,mode),0);
  const el=document.getElementById(`${mode}-ct-${cat}`);
  if(el)el.textContent=fmt(t);
  // keep maxHeight in sync so collapse/expand stays accurate
  const body=document.getElementById(`body-${mode}-${cat}`);
  if(body && !body.classList.contains('collapsed')) body.style.maxHeight=body.scrollHeight+'px';
}

function toggleInvSec(mode,cat){
  const body=document.getElementById(`body-${mode}-${cat}`);
  const tog=document.getElementById(`tog-${mode}-${cat}`);
  if(!body)return;
  if(body.classList.contains('collapsed')){
    body.classList.remove('collapsed');
    body.style.maxHeight=body.scrollHeight+'px';
    tog.classList.remove('collapsed');
  } else {
    body.style.maxHeight=body.scrollHeight+'px';
    requestAnimationFrame(()=>{ body.style.maxHeight=body.scrollHeight+'px';
      requestAnimationFrame(()=>{ body.classList.add('collapsed'); tog.classList.add('collapsed'); });
    });
  }
}

function reRenderInvSec(mode,cat){
  const items=mode==='cart'?S.cartItems[cat]:S.stockItems[cat];
  const old=document.getElementById(`sec-${mode}-${cat}`);
  if(!old)return;
  // preserve collapsed state
  const wasCollapsed=!!document.getElementById(`body-${mode}-${cat}`)?.classList.contains('collapsed');

    if(body){body.classList.add('collapsed');body.style.maxHeight='0';}

  }
}

function addCat(mode){
  const inp=document.getElementById(mode+'-new-cat');
  const name=inp.value.trim();
  if(!name){showSnack('請輸入分類名稱');return;}
  const cats=mode==='cart'?S.cartCats:S.stockCats;
  if(cats.includes(name)){showSnack('分類已存在');return;}
  cats.push(name);
  const ref=mode==='cart'?S.cartItems:S.stockItems;
  if(!ref[name])ref[name]=[];
  save();inp.value='';
  if(mode==='cart')renderCart();else renderStock();
  showSnack('已新增分類：'+name);
}

function renameCat(mode,oldName,el){
  const newName=el.value.replace(/[【】]/g,'').trim();
  if(!newName||newName===oldName){el.value='【'+oldName+'】';return;}
  const cats=mode==='cart'?S.cartCats:S.stockCats;
  const idx=cats.indexOf(oldName);if(idx>=0)cats[idx]=newName;
  const ref=mode==='cart'?S.cartItems:S.stockItems;
  ref[newName]=ref[oldName]||[];delete ref[oldName];
  save();
  if(mode==='cart')renderCart();else renderStock();
  showSnack('已重新命名：'+newName);
}

// 套用匯入資料。成功回傳 true；任何失敗完整回滾（記憶體與畫面），localStorage 絕不寫入壞資料
function importData(data){
  const prev=S;
  try{
    if(!data||typeof data!=='object'||Array.isArray(data))throw new Error('格式錯誤');
    if(!data.products||typeof data.products!=='object'||Array.isArray(data.products))throw new Error('格式錯誤');
    // 結構補齊：舊版或欄位不全的備份檔補成完整結構，不再造成半毀狀態
    if(!Array.isArray(data.cartCats))data.cartCats=[];
    if(!Array.isArray(data.stockCats))data.stockCats=[];
    if(!data.cartItems||typeof data.cartItems!=='object')data.cartItems={};
    if(!data.stockItems||typeof data.stockItems!=='object')data.stockItems={};
    // 匯入採忠實還原：沿用檔案內的 thresholds，不補預設值（確保匯出＝匯入）
    if(!data.thresholds||typeof data.thresholds!=='object')data.thresholds={};
    // 舊版備份沒有門市名稱欄位：沿用目前輸入的值，不清空
    if(data.storeName===undefined)data.storeName=prev.storeName||'';
    S=data;
    S.cartCats.forEach(c=>{if(!S.cartItems[c])S.cartItems[c]=[];});
    S.stockCats.forEach(c=>{if(!S.stockItems[c])S.stockItems[c]=[];});
    // 先渲染（等同深度驗證），全部成功才寫入 localStorage
    renderCart();renderStock();renderPrice();renderPrint();renderThreshPanel();updateHeaderTotal();restoreStoreName();
    save();
    return true;
  }catch(err){
    S=prev;
    renderCart();renderStock();renderPrice();renderPrint();updateHeaderTotal();restoreStoreName();
    return false;
  }
}
function importConfig(){
  const inp=document.createElement('input');
  inp.type='file';inp.accept='.json,application/json';
  inp.onchange=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      let data;
      try{data=JSON.parse(ev.target.result);}catch(err){showSnack('匯入失敗：檔案格式不正確');return;}
      if(!data||typeof data!=='object'||!data.products){showSnack('匯入失敗：檔案格式不正確');return;}
      if(!confirm('匯入後將覆蓋目前所有資料（商品設定、攤車庫存、現場庫存），確定繼續？'))return;
      showSnack(importData(data)?'資料匯入成功！':'匯入失敗：檔案格式不正確');
    };
    reader.readAsText(file);
  };
  inp.click();
}

// ── 同步攤車/現場與商品管理 ──
// 移除攤車與現場中已不存在於商品管理的品項
function purgeOrphanInvItems(){
  const allPids=new Set(allProducts().map(p=>p.id));
  let changed=false;
  ['cart','stock'].forEach(mode=>{
    const ref=mode==='cart'?S.cartItems:S.stockItems;
    const cats=mode==='cart'?S.cartCats:S.stockCats;
    cats.forEach(c=>{
      if(!ref[c])return;
      const before=ref[c].length;
      ref[c]=ref[c].filter(i=>allPids.has(i.pid));
      if(ref[c].length!==before)changed=true;
    });
  });
  return changed;
}
// 將商品管理的 name/spec 同步回攤車/現場的 item 紀錄
function syncInvItemMeta(){
  ['cart','stock'].forEach(mode=>{
    const ref=mode==='cart'?S.cartItems:S.stockItems;
    const cats=mode==='cart'?S.cartCats:S.stockCats;
    cats.forEach(c=>{
      (ref[c]||[]).forEach(item=>{
        const p=findProduct(item.pid);
        // 只同步品名；規格由各盤點列自行保留（可獨立編輯），不再被商品管理覆蓋
        if(p){item.name=p.name;}
      });
    });
  });
}

function pUpd(cat,idx,field,val){
  const items=S.products[cat];if(!items||!items[idx])return;
  if(field==='name'||field==='unit')items[idx][field]=val;
  else items[idx][field]=parseFloat(val)||0;
  // 只同步攤車/現場 item 的品名（規格由各盤點列自訂保留，不同步；
  // 注意：既有列以舊規格×新單價計值，修正商品規格後請確認各列規格是否需一併更新）
  syncInvItemMeta();
  save();
  const el=document.getElementById(`ppg-${cat}-${idx}`);
  if(el)el.textContent=fmtpg(pgForProduct(items[idx]));
  renderCart();renderStock();
  updateHeaderTotal();
}
function pDel(cat,idx){
  if(!confirm('確定刪除此商品？攤車與現場庫存中同品項的盤點資料將一併自動移除。'))return;
  S.products[cat].splice(idx,1);
  purgeOrphanInvItems();
  save();renderPrice();renderCart();renderStock();updateHeaderTotal();showSnack('已刪除，庫存已同步');
}
function pAdd(cat){
  const name=document.getElementById(`pa-name-${cat}`).value.trim();
  const price=parseFloat(document.getElementById(`pa-price-${cat}`).value)||0;
  const spec=parseFloat(document.getElementById(`pa-spec-${cat}`).value)||1;
  const unit=document.getElementById(`pa-unit-${cat}`).value.trim()||'克';
  if(!name){showSnack('請填入品名');return;}
  if(!S.products[cat])S.products[cat]=[];
  const newPid=uid();
  S.products[cat].push({id:newPid,name,price,spec,unit});
  // 自動套用預設異常通知：高於 2000 元
  if(!S.thresholds)S.thresholds={};
  if(!S.thresholds[newPid])S.thresholds[newPid]={low:null,high:2000};
  save();renderPrice();renderCart();renderStock();showSnack('已新增：'+name);
}
function resetProducts(){
  if(!confirm('重置商品資料將會以程式預設值覆蓋目前商品管理的品項與價格，並同步清除攤車與現場中已不存在的品項，確定繼續？'))return;
  S.products=JSON.parse(JSON.stringify(DEF.products));
  syncInvItemMeta();
  purgeOrphanInvItems();

}

function getThresh(pid){
  return (S.thresholds && S.thresholds[pid]) ? S.thresholds[pid] : null;
}
function setThresh(pid, type, val){
  if(!S.thresholds) S.thresholds={};
  if(!S.thresholds[pid]) S.thresholds[pid]={low:null,high:null};
  const v = (val===''||val===null) ? null : parseFloat(val);
  S.thresholds[pid][type] = (v===null||isNaN(v)) ? null : v;
  // 兩者皆 null 仍保留 key：作為「使用者明確清除」的記號，load() 才不會把預設值套回來
  save();
}

// 掃描所有攤車+現場庫存品項，比對對應商品的閾值
function checkAlerts(){
  const alerts=[];

  // ── 金額門檻判斷（攤車＋現場各自掃描）──
  function scanThresh(cats,modeKey){
    cats.forEach(cat=>{
      const items=modeKey==='cart'?(S.cartItems[cat]||[]):(S.stockItems[cat]||[]);
      items.forEach(item=>{
        const t=getThresh(item.pid);
        if(!t) return;
        const v=itemValue(item,modeKey);
        if(t.low!==null && v < t.low) alerts.push({item,val:v,thresh:t.low,type:'low',mode:modeKey});
        else if(t.high!==null && v > t.high) alerts.push({item,val:v,thresh:t.high,type:'high',mode:modeKey});
      });
    });
  }
  scanThresh(S.cartCats,'cart');
  scanThresh(S.stockCats,'stock');

  // ── 未輸入數量判斷（合併：攤車＋現場都沒輸入才算異常）──
  // 以商品管理所有品項為基準
  for(const cat in S.products){
    (S.products[cat]||[]).forEach(p=>{
      // 在攤車庫存中找這個商品，且 qty > 0
      let hasCart=false;
      for(const c of S.cartCats){
        const found=(S.cartItems[c]||[]).find(i=>i.pid===p.id && parseFloat(i.qty||0)>0);
        if(found){hasCart=true;break;}
      }
      // 在現場庫存中找這個商品，且 qty > 0
      let hasStock=false;
      for(const c of S.stockCats){
        const found=(S.stockItems[c]||[]).find(i=>i.pid===p.id && parseFloat(i.qty||0)>0);
        if(found){hasStock=true;break;}
      }
      // 合併判斷：兩邊都沒有輸入才算異常
      if(!hasCart && !hasStock){
        alerts.push({item:{id:p.id,pid:p.id,name:p.name},val:0,thresh:0,type:'missing',mode:'both'});
      }
    });
  }

  return alerts;
}

function renderPrint(){
  const body=document.getElementById('sum-body');body.innerHTML='';
  let grand=0;
  const alerts=checkAlerts();

  // 異常摘要列
  const existing=document.getElementById('alert-summary-bar');
  if(existing)existing.remove();
  const sumBar=document.createElement('div');
  sumBar.id='alert-summary-bar';
  const lowCount=alerts.filter(a=>a.type==='low').length;
  const highCount=alerts.filter(a=>a.type==='high').length;
  const missingCount=alerts.filter(a=>a.type==='missing').length;
  if(alerts.length===0){
    sumBar.className='alert-summary-bar clean';
    sumBar.innerHTML='<span>✅</span><span>所有品項庫存正常，盤點完整</span>';
  } else {
    sumBar.className='alert-summary-bar has-alert';
    const parts=[];
    if(missingCount>0) parts.push(`${missingCount} 項未盤點`);
    if(lowCount>0) parts.push(`${lowCount} 項偏低`);
    if(highCount>0) parts.push(`${highCount} 項偏高`);
    sumBar.innerHTML=`<span>⚠️</span><span>${parts.join('、')}，請確認庫存</span>`;
  }
  body.parentNode.insertBefore(sumBar,body);

  // 合併攤車+現場，按分類彙整所有品項（攤車庫存金額 + 現場庫存金額）
  function buildCombinedSec(){
    // ── 第一步：全域 pidMap，跨所有分類合併同一商品的金額與數量（攤車/現場分開累計）──
    const globalPidMap={};
    const fmtQ=n=>{n=+(+n||0).toFixed(2);return n.toString();};
    const acc=(item,mode)=>{
      if(!globalPidMap[item.pid])globalPidMap[item.pid]={name:item.name,pid:item.pid,total:0,
        cartQty:0,stockQty:0,cartBase:0,stockBase:0,cartSpecs:new Set(),stockSpecs:new Set()};
      const e=globalPidMap[item.pid];
      e.total+=itemValue(item,mode);
      const q=parseFloat(item.qty)||0,sp=parseFloat(item.spec)||1;
      e[mode+'Qty']+=q;e[mode+'Base']+=q*sp;
      if(q>0)e[mode+'Specs'].add(sp);
    };
    S.cartCats.forEach(cat=>(S.cartItems[cat]||[]).forEach(item=>acc(item,'cart')));
    S.stockCats.forEach(cat=>(S.stockItems[cat]||[]).forEach(item=>acc(item,'stock')));
    // 數量顯示：同一側各列規格一致時顯示輸入的數量；規格不一致時改以「數量×規格」基準單位顯示，
    // 避免不同規格的數量被直接相加成無意義的數字
    const qtyLine=e=>{
      const side=pre=>{
        if(e[pre+'Specs'].size>1){const p2=findProduct(e.pid);return fmtQ(e[pre+'Base'])+(p2?p2.unit:'');}
        return fmtQ(e[pre+'Qty']);
      };
      return `攤車 ${side('cart')}　現場 ${side('stock')}`;
    };
    // 有盤點數量但金額為 0（單價未設定）的品項也要顯示，不可從報表中消失
    const visible=e=>e.total>0||e.cartQty>0||e.stockQty>0;
    const rowHtml=e=>{
      const v=e.total,t=getThresh(e.pid);
      let badge='',rowCls='sum-row';
      if(t){
        if(t.low!==null && v<t.low){badge=`<span class="alert-badge low"><span class="alert-dot"></span>偏低</span>`;rowCls='sum-row has-alert-low';}
        else if(t.high!==null && v>t.high){badge=`<span class="alert-badge high"><span class="alert-dot"></span>偏高</span>`;rowCls='sum-row has-alert-high';}
      }
      return `<div class="${rowCls}"><span class="sum-item-name">▸ ${esc(e.name)}</span><div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:flex-end"><span class="sum-qty">${qtyLine(e)}</span>${badge}<span class="sum-row-val">${fmt(v)}</span></div></div>`;
    };
    // ── 第二步：按商品管理分類順序顯示，每個 pid 只出現一次 ──
    const shownPids=new Set();
    const productCats=Object.keys(S.products);
    let total=0;let html='';
    productCats.forEach(cat=>{
      let ct=0;let rows='';
      (S.products[cat]||[]).forEach(p=>{
        if(shownPids.has(p.id))return;
        const entry=globalPidMap[p.id];
        if(!entry||!visible(entry))return;
        shownPids.add(p.id);
        rows+=rowHtml(entry);ct+=entry.total;
      });
      if(rows!==''){html+=`<div class="sum-row"><span style="font-size:12px;font-weight:700;color:var(--text2)">【${esc(cat)}】小計</span><span class="sum-row-val hi">${fmt(ct)}</span></div>${rows}`;total+=ct;}
    });
    // 補上不在商品管理分類的品項（新建自訂分類）
    let extraCt=0;let extraRows='';
    Object.values(globalPidMap).forEach(entry=>{
      if(shownPids.has(entry.pid)||!visible(entry))return;
      shownPids.add(entry.pid);
      extraRows+=rowHtml(entry);extraCt+=entry.total;
    });
    if(extraRows!==''){html+=`<div class="sum-row"><span style="font-size:12px;font-weight:700;color:var(--text2)">【其他】小計</span><span class="sum-row-val hi">${fmt(extraCt)}</span></div>${extraRows}`;total+=extraCt;}
    grand+=total;
    const wrap=document.createElement('div');wrap.className='sec-wrap';
    const card=document.createElement('div');card.className='sec-card';
    card.innerHTML=`<div class="sec-hdr"><input class="sec-title-inp" value="📋 庫存彙整（攤車＋現場）" readonly style="pointer-events:none"><div class="sec-total">${fmt(total)}</div></div>${html||'<div class="empty-hint">尚無資料</div>'}`;
    wrap.appendChild(card);body.appendChild(wrap);
  }
  buildCombinedSec();

  // ── 未盤點品項區塊 ──
  const missingAlerts=alerts.filter(a=>a.type==='missing');
  if(missingAlerts.length>0){
    const wrap=document.createElement('div');wrap.className='sec-wrap';
    const card=document.createElement('div');card.className='sec-card';
    let missingHtml='';
    missingAlerts.forEach(a=>{
      missingHtml+=`<div class="sum-row has-alert-missing"><span class="sum-item-name">▸ ${esc(a.item.name)}</span><span class="alert-badge missing"><span class="alert-dot"></span>未盤點</span></div>`;
    });
    card.innerHTML=`<div class="sec-hdr" style="background:#fdf0f0"><input class="sec-title-inp" value="⚠️ 未盤點品項（攤車＋現場均無數量）" readonly style="pointer-events:none;color:var(--red)"><div class="sec-total" style="color:var(--red)">${missingAlerts.length} 項</div></div>${missingHtml}`;
    wrap.appendChild(card);body.appendChild(wrap);
  }

  // ── 食材 & 包材 小計 ──
  // 規則：攤車所有分類（含自訂）一律算食材（使用者決策）；
  // 現場依「商品管理中該商品所屬分類」判定——包材/清潔用品類的商品算包材，其餘算食材。
  // 以商品身分而非攤車/現場的分類名稱判定，分類改名或放進自訂分類都不影響歸類；
  // 亦保證 食材小計 ＋ 包材小計 == 全店總金額。
  const PACK_PRODUCT_CATS=['包材','清潔用品'];
  const packPids=new Set();
  PACK_PRODUCT_CATS.forEach(c=>(S.products[c]||[]).forEach(p=>packPids.add(p.id)));
  let foodTotal=0, packTotal=0;
  (S.cartCats||[]).forEach(c=>(S.cartItems[c]||[]).forEach(i=>foodTotal+=itemValue(i,'cart')));
  (S.stockCats||[]).forEach(c=>(S.stockItems[c]||[]).forEach(i=>{
    const v=itemValue(i,'stock');
    if(packPids.has(i.pid))packTotal+=v; else foodTotal+=v;
  }));
  document.getElementById('sub-food').textContent=fmt(foodTotal);
  document.getElementById('sub-pack').textContent=fmt(packTotal);

  document.getElementById('grand').textContent=fmt(grandTotal());
  updateHeaderTotal();
}

// 列印標題還原：原始標題只在第一次換名時記錄一次（防連按兩次把檔名當原標題）；
// afterprint 或 60 秒保險絲觸發還原，兩者皆冪等，事件沒觸發也不會永久卡在檔名
let _printOrigTitle=null;
function restorePrintTitle(){if(_printOrigTitle!==null){document.title=_printOrigTitle;_printOrigTitle=null;}}
function doPrint(){
  const now=new Date();
  const ts=`${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
  const storeName=(S.storeName||'').trim();
  const storeLabel=storeName?storeName+' ｜ ':'';
  document.getElementById('pm').textContent=storeLabel+'盤點時間：'+ts+'　麻的小辛辣 — 內部使用';
  renderPrint();
  // 暫時把網頁標題改成檔名，讓瀏覽器「另存為 PDF」預設帶入
  if(_printOrigTitle===null)_printOrigTitle=document.title;
  document.title=exportBaseName(now);
  window.addEventListener('afterprint',restorePrintTitle,{once:true});
  setTimeout(restorePrintTitle,60000);
  setTimeout(()=>window.print(),100);
}

function exportExcel(){
  const now=new Date();
  const ts=`${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
  let rows=[
    ['麻的小辛辣｜庫存金額彙整報表'],
    ['門市：'+((S.storeName||'').trim()||'（未填寫）')],
    ['盤點時間：'+ts],[],
    ['區域','分類','品名','規格','數量','單位','金額(元)'],
  ];
  S.cartCats.forEach(cat=>(S.cartItems[cat]||[]).forEach(item=>{
    const p=findProduct(item.pid);
    const v=itemValue(item,'cart');
    rows.push(['攤車庫存',cat,item.name,item.spec,item.qty||0,p?p.unit:'—',Math.round(v)]);
  }));
  rows.push([]);
  S.stockCats.forEach(cat=>(S.stockItems[cat]||[]).forEach(item=>{
    const p=findProduct(item.pid);
    const v=itemValue(item,'stock');
    rows.push(['現場庫存',cat,item.name,item.spec,item.qty||0,p?p.unit:'—',Math.round(v)]);
  }));
  rows.push([]);rows.push(['','','','','','全店總計',Math.round(grandTotal())]);
  // 開頭為 = + - @ 的文字補一個空白，避免 Excel 把使用者輸入的品名誤判為公式（CSV injection）
  const cell=c=>{let s=String(c);if(typeof c==='string'&&/^[=+\-@]/.test(s))s=' '+s;return '"'+s.replace(/"/g,'""')+'"';};
  const csv='\uFEFF'+rows.map(r=>r.map(cell).join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;
  a.download=exportBaseName(now)+'.csv';
  a.click();URL.revokeObjectURL(url);
  showSnack('Excel 已下載');
}

// ── Snack ──
let _st;
function showSnack(msg){
  const el=document.getElementById('snack');el.textContent=msg;el.classList.add('show');
  clearTimeout(_st);_st=setTimeout(()=>el.classList.remove('show'),2200);
}


// ════════════════════════════════════════
// 後台入口（長按總金額 3 秒）
// ════════════════════════════════════════
let _adminHoldTimer = null;
let _adminHoldProgress = null;

function startAdminHold(){
  cancelAdminHold();
  // 顯示進度提示
  let count = 3;
  const badge = document.getElementById('header-total');
  const origText = badge.textContent;
  _adminHoldProgress = setInterval(()=>{
    count--;
    badge.textContent = count > 0 ? `後台 ${count}…` : '進入中…';
    if(count <= 0){ clearInterval(_adminHoldProgress); _adminHoldProgress = null; }
  }, 1000);

  _adminHoldTimer = setTimeout(()=>{
    badge.textContent = origText;
    openAdminPanel();
  }, 3000);
}

function cancelAdminHold(){
  if(_adminHoldTimer){ clearTimeout(_adminHoldTimer); _adminHoldTimer = null; }
  if(_adminHoldProgress){ clearInterval(_adminHoldProgress); _adminHoldProgress = null; }
  // 還原顯示
  updateHeaderTotal();
}

function openAdminPanel(){
  // 切換到列印分頁
  switchTab('print');
  // 顯示設定面板
  const panel = document.getElementById('threshold-panel');
  panel.style.display = 'block';
  renderThreshPanel();
  // 捲到頂部
  document.querySelector('.tab-content').scrollTop = 0;
  showSnack('已進入後台設定');
}

function hideAdminPanel(){
  const panel = document.getElementById('threshold-panel');
  panel.style.display = 'none';
  showSnack('已關閉後台設定');
}

// ── 初始化 ──
load();restoreStoreName();renderCart();renderStock();renderPrice();updateHeaderTotal();
</script>
