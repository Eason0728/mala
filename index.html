<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>麻的小辛辣｜庫存管理系統</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap');
:root{
  --bg:#fafaf8;--surface:#ffffff;--border:#e8e6e0;--border2:#d4d0c8;
  --text:#1a1a18;--text2:#5a5850;--text3:#9a9890;
  --safe-bottom:env(safe-area-inset-bottom,0px);
  /* 攤車庫存 - 橄欖綠 */
  --c1:#3d5a3e;--c1b:#4a6e4b;--c1bg:#f0f4f0;--c1light:#e4ede4;--c1mid:#c8dac8;
  /* 現場庫存 - 赭土橘 */
  --c2:#7a4020;--c2b:#8f4d28;--c2bg:#faf4f0;--c2light:#f5e8e0;--c2mid:#e8cdb8;
  /* 商品管理 - 石板藍 */
  --c3:#2d4a6b;--c3b:#385a82;--c3bg:#f0f4f8;--c3light:#e0eaf4;--c3mid:#b8ceea;
  /* 列印 - 中性深 */
  --c4:#2a2a28;--c4b:#3a3a38;--c4bg:#f4f4f2;--c4light:#ebebea;
  --accent:#e8702a;--red:#c0392b;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;font-size:15px;overscroll-behavior:none}
#app{display:flex;flex-direction:column;height:100dvh}
 
/* ── Header ── */
header{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;flex-shrink:0;display:flex;align-items:center;gap:12px}
.logo-wrap{flex-shrink:0}
.logo-wrap img{height:44px;width:auto;display:block}
.header-info{flex:1;min-width:0}
.brand-sub{font-size:10px;color:var(--text3);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:2px}
.brand-name{font-size:15px;font-weight:700;color:var(--text);letter-spacing:0.02em}
.total-badge{background:var(--text);color:var(--surface);font-family:'DM Mono',monospace;font-size:12px;font-weight:500;padding:5px 11px;border-radius:6px;flex-shrink:0;letter-spacing:0.02em}
 
/* ── Tabs ── */
.tab-bar{display:grid;grid-template-columns:repeat(4,1fr);background:var(--surface);border-bottom:2px solid var(--border);flex-shrink:0}
.tab-btn{background:none;border:none;color:var(--text3);font-family:'Noto Sans TC',sans-serif;font-size:11px;font-weight:500;padding:10px 4px 8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .15s;letter-spacing:0.02em}
.tab-btn .ti{font-size:16px}
.tab-btn[data-tab=cart].active{color:var(--c1);border-bottom-color:var(--c1)}
.tab-btn[data-tab=stock].active{color:var(--c2);border-bottom-color:var(--c2)}
.tab-btn[data-tab=price].active{color:var(--c3);border-bottom-color:var(--c3)}
.tab-btn[data-tab=print].active{color:var(--c4);border-bottom-color:var(--c4)}
 
/* ── Content ── */
.tab-content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(20px + var(--safe-bottom))}
.page{display:none}
.page.active{display:block}
 
/* ── Section headers by tab ── */
.sec-wrap{margin:14px 14px 0}
.sec-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:0}
.sec-hdr{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--border)}
 
/* Cart sections */
#page-cart .sec-hdr{background:var(--c1light)}
#page-cart .sec-hdr .sec-idx:nth-child(1){color:var(--c1)}
#page-cart .sec-total{color:var(--c1b)}
/* Stock sections */
#page-stock .sec-hdr{background:var(--c2light)}
#page-stock .sec-total{color:var(--c2b)}
/* Price sections */
#page-price .sec-hdr{background:var(--c3light)}
#page-price .sec-total{color:var(--c3b)}
 
.sec-title-inp{background:transparent;border:none;color:var(--text);font-family:'Noto Sans TC',sans-serif;font-size:13px;font-weight:700;flex:1;min-width:0;letter-spacing:0.04em}
.sec-title-inp:focus{outline:none}
.sec-total{font-family:'DM Mono',monospace;font-size:12px;font-weight:500;white-space:nowrap}
.sec-del{background:none;border:none;color:var(--text3);font-size:15px;cursor:pointer;padding:2px 4px;line-height:1}
 
/* ── Item Row (攤車/庫存) ── */
.item-row{display:flex;align-items:flex-start;padding:10px 14px;border-bottom:1px solid var(--border);gap:10px}
.item-row:last-child{border-bottom:none}
.item-left{flex:1;min-width:0;display:flex;flex-direction:column;gap:5px}
.item-name-inp{background:transparent;border:none;border-bottom:1px solid var(--border2);color:var(--text);font-family:'Noto Sans TC',sans-serif;font-size:14px;font-weight:500;padding:2px 0 4px;width:100%}
.item-name-inp:focus{outline:none;border-bottom-color:var(--accent)}
.item-sub-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.sub-lbl{font-size:11px;color:var(--text3);white-space:nowrap}
.spec-inp{background:var(--bg);border:1px solid var(--border2);border-radius:5px;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;padding:3px 6px;text-align:center}
.spec-inp:focus{outline:none;border-color:var(--accent)}
.unit-tag{font-size:11px;color:var(--text2);background:var(--border);padding:2px 7px;border-radius:12px;white-space:nowrap;font-family:'DM Mono',monospace}
.item-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.num-inp{background:var(--bg);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:'DM Mono',monospace;font-size:16px;font-weight:500;text-align:center;padding:6px 0;width:72px;height:38px;-webkit-appearance:none;appearance:none}
.num-inp:focus{outline:none;border-color:var(--accent)}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
.unit-lbl{font-size:10px;color:var(--text3);text-align:right}
.item-val{font-family:'DM Mono',monospace;font-size:12px;font-weight:500;min-width:72px;text-align:right;color:var(--text2)}
.item-val.zero{color:var(--text3)}
#page-cart .item-val:not(.zero){color:var(--c1b)}
#page-stock .item-val:not(.zero){color:var(--c2b)}
.item-del{background:none;border:none;color:var(--text3);font-size:13px;cursor:pointer;padding:3px;align-self:center;opacity:.6}
.item-del:active{opacity:1}
 
/* ── Add row ── */
.add-item-row{padding:9px 14px;border-top:1px dashed var(--border2);display:flex;gap:8px;align-items:center}
.add-item-inp{flex:1;background:var(--bg);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-size:13px;padding:7px 10px}
.add-item-inp:focus{outline:none;border-color:var(--accent)}
.add-cat-bar{padding:12px 14px;display:flex;gap:8px;margin-top:4px}
.add-cat-inp{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;padding:8px 12px}
.add-cat-inp:focus{outline:none;border-color:var(--accent)}
 
/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;gap:5px;border:none;border-radius:8px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;font-weight:700;font-size:12px;padding:7px 13px;transition:all .15s;white-space:nowrap;letter-spacing:0.02em}
.btn-cart{background:var(--c1);color:#fff}
.btn-stock{background:var(--c2);color:#fff}
.btn-price{background:var(--c3);color:#fff}
.btn-print{background:var(--c4);color:#fff}
.btn-outline{background:transparent;border:1px solid var(--border2);color:var(--text2)}
.btn-sm{padding:5px 10px;font-size:11px}
.btn-danger{background:transparent;border:1px solid var(--red);color:var(--red);padding:4px 8px;font-size:11px;border-radius:5px;cursor:pointer;font-weight:700}
 
/* ── Price Table ── */
.ptw{overflow-x:auto}
.pt{width:100%;border-collapse:collapse;font-size:12px}
.pt th{background:var(--c3bg);color:var(--text2);font-weight:700;padding:8px 10px;text-align:left;letter-spacing:.04em;white-space:nowrap;border-bottom:1px solid var(--border)}
.pt td{padding:7px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
.pt tr:last-child td{border-bottom:none}
.pt td.cmp{color:var(--c3b);font-family:'DM Mono',monospace;font-size:12px;font-weight:500}
.pt input{background:var(--bg);border:1px solid var(--border);border-radius:5px;color:var(--text);font-size:12px;padding:4px 6px;width:100%;font-family:'DM Mono',monospace}
.pt input:focus{outline:none;border-color:var(--c3)}
.add-form{padding:12px 14px;background:var(--c3bg);border-top:1px solid var(--border);display:flex;flex-direction:column;gap:8px}
.add-form-row{display:flex;gap:8px;flex-wrap:wrap}
.add-form label{font-size:10px;color:var(--text3);margin-bottom:3px;display:block;letter-spacing:0.04em;text-transform:uppercase}
.add-form .field{flex:1;min-width:90px}
.add-form input{background:var(--surface);border:1px solid var(--border2);border-radius:7px;color:var(--text);font-size:13px;padding:7px 9px;width:100%}
.add-form input:focus{outline:none;border-color:var(--c3)}
.add-form-title{font-size:11px;font-weight:700;color:var(--c3);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:4px}
 
/* ── 列印頁 ── */
.sum-top{margin:14px 14px 0;padding:20px;background:var(--surface);border:1px solid var(--border);border-radius:12px;text-align:center}
.sum-top-lbl{font-size:10px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase}
.sum-top-num{font-family:'DM Mono',monospace;font-size:34px;font-weight:400;color:var(--text);margin-top:6px}
.sum-row{display:flex;justify-content:space-between;align-items:center;padding:9px 14px;border-bottom:1px solid var(--border)}
.sum-row:last-child{border-bottom:none}
.sum-row-name{font-size:12px;color:var(--text2)}
.sum-row-val{font-family:'DM Mono',monospace;font-size:13px;color:var(--text)}
.sum-row-val.hi{font-weight:700}
.sum-item-name{font-size:12px;color:var(--text3);padding-left:10px}
.action-bar{padding:14px;display:flex;gap:8px;flex-wrap:wrap}
 
/* ── Modal ── */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:flex;align-items:flex-end;justify-content:center}
.mo.hidden{display:none}
.mo-box{background:var(--surface);border-radius:16px 16px 0 0;padding:24px;width:100%;max-width:480px}
.mo-title{font-size:15px;font-weight:700;margin-bottom:8px}
.mo-sub{font-size:13px;color:var(--text3)}
.mo-btns{display:flex;gap:10px;margin-top:16px}
.mo-btns .btn{flex:1;justify-content:center}
 
/* ── Snack ── */
#snack{position:fixed;bottom:calc(70px + var(--safe-bottom));left:50%;transform:translateX(-50%) translateY(16px);background:var(--text);color:var(--surface);font-size:13px;padding:9px 18px;border-radius:20px;opacity:0;transition:all .22s;pointer-events:none;white-space:nowrap;z-index:999}
#snack.show{opacity:1;transform:translateX(-50%) translateY(0)}
 
/* ── Category color grades ── */
#page-cart .sec-card:nth-child(1) .sec-hdr{background:var(--c1light)}
#page-cart .sec-card:nth-child(2) .sec-hdr{background:#dde8dd}
#page-cart .sec-card:nth-child(3) .sec-hdr{background:#d0dfd0}
#page-cart .sec-card:nth-child(n+4) .sec-hdr{background:#c5d7c5}
#page-stock .sec-card:nth-child(1) .sec-hdr{background:var(--c2light)}
#page-stock .sec-card:nth-child(2) .sec-hdr{background:#f0e0d4}
#page-stock .sec-card:nth-child(3) .sec-hdr{background:#ead4c0}
#page-stock .sec-card:nth-child(4) .sec-hdr{background:#e4ccb4}
#page-stock .sec-card:nth-child(5) .sec-hdr{background:#dcc4a8}
#page-stock .sec-card:nth-child(n+6) .sec-hdr{background:#d4bc9c}
#page-price .sec-card:nth-child(1) .sec-hdr{background:var(--c3light)}
#page-price .sec-card:nth-child(2) .sec-hdr{background:#d4e2f0}
#page-price .sec-card:nth-child(3) .sec-hdr{background:#c8d8ec}
#page-price .sec-card:nth-child(n+4) .sec-hdr{background:#bccee8}
 
/* ── Print ── */
.ph{display:none}.pm{display:none}
@media print{
  *{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  body{background:#fff!important;color:#000!important;font-size:10pt}
  #app{height:auto}
  header,.tab-bar,.action-bar,#snack,.mo{display:none!important}
  .tab-content{overflow:visible}
  .page{display:none!important}
  .page#page-print{display:block!important}
  .sec-wrap,.sec-card,.sum-top{page-break-inside:avoid}
  .ph{display:block!important;text-align:center;padding:12px 0 6px;font-size:16pt;font-weight:700;border-bottom:2px solid #000;margin-bottom:10px}
  .pm{display:block!important;text-align:center;font-size:9pt;color:#666;margin-bottom:14px}
}
.empty-hint{padding:18px;text-align:center;color:var(--text3);font-size:13px}
</style>
</head>

const DEF_CATS = Object.keys(DEF_PRODUCTS);
const DEF = {
  cartCats:['蔬菜','火鍋料','常溫食材'],
  stockCats:['蔬菜','火鍋料','常溫食材','辛香料','醬料','飲料冰品','包材','清潔用品'],
  products: JSON.parse(JSON.stringify(DEF_PRODUCTS)),
  // 攤車項目: [{id, pid, name, spec, qty}]
  cartItems:{}, // cat -> []
  // 現場庫存項目: [{id, pid, name, spec, qty}]
  stockItems:{}, // cat -> []
};
DEF_CATS.forEach(c=>{DEF.cartItems[c]=[];DEF.stockItems[c]=[];});
 
// ── State ──
let S={};
function load(){
  try{const v=localStorage.getItem('mala_v5');S=v?JSON.parse(v):JSON.parse(JSON.stringify(DEF));}
  catch(e){S=JSON.parse(JSON.stringify(DEF));}
  // ensure all cats exist in items
  (S.cartCats||[]).forEach(c=>{if(!S.cartItems[c])S.cartItems[c]=[];});
  (S.stockCats||[]).forEach(c=>{if(!S.stockItems[c])S.stockItems[c]=[];});
}
function save(){localStorage.setItem('mala_v5',JSON.stringify(S));}
 
// ── 計算 ──
function pgForProduct(p){
  const eff=p.spec*(p.yld||1);
  return eff>0?p.price/eff:p.price;
}
function itemValue(item,mode){
  // find product by pid
  const p=findProduct(item.pid);
  if(!p)return 0;
  const pg=pgForProduct(p);
  const spec=parseFloat(item.spec)||1;
  const qty=parseFloat(item.qty)||0;
  return qty*spec*pg;
}
function findProduct(pid){
  for(const c in S.products){
    const f=(S.products[c]||[]).find(p=>p.id===pid);
    if(f)return f;
  }
  return null;
}
function allProducts(){
  const list=[];
  for(const c in S.products)(S.products[c]||[]).forEach(p=>list.push(p));
  return list;
}
function fmt(n){return '$'+Math.round(n).toLocaleString();}
function fmtpg(n){
  if(n>=1)return n.toFixed(2);
  return n.toFixed(4);
}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5);}
function grandTotal(){
  let t=0;
  (S.cartCats||[]).forEach(c=>(S.cartItems[c]||[]).forEach(i=>t+=itemValue(i,'cart')));
  (S.stockCats||[]).forEach(c=>(S.stockItems[c]||[]).forEach(i=>t+=itemValue(i,'stock')));
  return t;
}
function updateHeaderTotal(){document.getElementById('header-total').textContent=fmt(grandTotal());}
 
// ── Tab ──
function switchTab(t){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+t).classList.add('active');
  document.getElementById('tab-'+t).classList.add('active');
  if(t==='print')renderPrint();
}

function buildInventoryPage(mode,pageId,cats,items){
  const page=document.getElementById(pageId);
  page.innerHTML='';
  cats.forEach(cat=>{
    page.appendChild(makeInvSec(mode,cat,items[cat]||[]));
  });
  const bar=document.createElement('div');
  bar.className='add-cat-bar';
  const btnCls=mode==='cart'?'btn-cart':'btn-stock';
  bar.innerHTML=`<input class="add-cat-inp" type="text" placeholder="新分類名稱" id="${mode}-new-cat"><button class="btn ${btnCls} btn-sm" onclick="addCat('${mode}')">＋ 新增分類</button>`;
  page.appendChild(bar);
  updateHeaderTotal();
}
 
function makeInvSec(mode,cat,items){
  const total=items.reduce((s,i)=>s+itemValue(i,mode),0);
  const sec=document.createElement('div');
  sec.className='sec-wrap';
  const card=document.createElement('div');
  card.className='sec-card';
  card.id=`sec-${mode}-${cat}`;
  // header
  const hdr=document.createElement('div');
  hdr.className='sec-hdr';
  hdr.innerHTML=`<input class="sec-title-inp" value="【${cat}】" onblur="renameCat('${mode}','${cat}',this)" onfocus="this.select()"><div class="sec-total" id="${mode}-ct-${cat}">${fmt(total)}</div><button class="sec-del" onclick="askDelCat('${mode}','${cat}')">✕</button>`;
  card.appendChild(hdr);
  items.forEach(item=>card.appendChild(makeInvRow(mode,cat,item)));
  // add item row
  const ar=document.createElement('div');
  ar.className='add-item-row';
  ar.innerHTML=makeProductSelect(mode,cat);
  card.appendChild(ar);
  sec.appendChild(card);
  return sec;
}
 
function makeProductSelect(mode,cat){
  const btnCls=mode==='cart'?'btn-cart':'btn-stock';
  const opts=allProducts().map(p=>`<option value="${p.id}">${p.name} (${p.unit})</option>`).join('');
  return `<select style="flex:1;background:var(--bg);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-size:12px;padding:7px 8px" id="selp-${mode}-${cat}"><option value="">選擇商品...</option>${opts}</select><button class="btn ${btnCls} btn-sm" onclick="addInvItem('${mode}','${cat}')">＋</button>`;
}
 
function makeInvRow(mode,cat,item){
  const p=findProduct(item.pid);
  const unit=p?p.unit:'—';
  const val=itemValue(item,mode);
  const row=document.createElement('div');
  row.className='item-row';
  row.id=`ir-${mode}-${item.id}`;
  row.innerHTML=`
    <div class="item-left">
      <input class="item-name-inp" type="text" value="${item.name}" onblur="updateInvMeta('${mode}','${cat}','${item.id}','name',this.value)">
      <div class="item-sub-row">
        <span class="sub-lbl">規格</span>
        <input class="spec-inp" type="number" inputmode="decimal" value="${item.spec||1}" style="width:64px" oninput="updateInvMeta('${mode}','${cat}','${item.id}','spec',this.value)">
        <span class="unit-tag">${unit}</span>
      </div>
    </div>
    <div class="item-right">
      <input class="num-inp" type="number" inputmode="decimal" min="0" step="1" value="${item.qty||''}" placeholder="0" oninput="updateInvQty('${mode}','${cat}','${item.id}',this.value)">
      <div class="unit-lbl">數量</div>
      <div class="item-val${val===0?' zero':''}" id="iv-${mode}-${item.id}">${val>0?fmt(val):'—'}</div>
    </div>
    <button class="item-del" onclick="delInvItem('${mode}','${cat}','${item.id}')">🗑</button>`;
  return row;
}
 
function addInvItem(mode,cat){
  const sel=document.getElementById(`selp-${mode}-${cat}`);
  const pid=sel.value;
  if(!pid){showSnack('請選擇商品');return;}
  const p=findProduct(pid);
  if(!p)return;
  const items=mode==='cart'?S.cartItems:S.stockItems;
  if(!items[cat])items[cat]=[];
  const id=uid();
  items[cat].push({id,pid,name:p.name,spec:p.spec,qty:0});
  save();
  sel.value='';
  reRenderInvSec(mode,cat);
  showSnack('已新增：'+p.name);
}
 
function updateInvQty(mode,cat,id,val){
  const items=mode==='cart'?S.cartItems[cat]:S.stockItems[cat];
  const item=items&&items.find(i=>i.id===id);
  if(!item)return;
  item.qty=parseFloat(val)||0;
  save();
  const v=itemValue(item,mode);
  const el=document.getElementById('iv-'+mode+'-'+id);
  if(el){el.textContent=v>0?fmt(v):'—';el.className='item-val'+(v>0?'':' zero');}
  refreshInvCatTotal(mode,cat);
  updateHeaderTotal();
}
 
function updateInvMeta(mode,cat,id,field,val){
  const items=mode==='cart'?S.cartItems[cat]:S.stockItems[cat];
  const item=items&&items.find(i=>i.id===id);
  if(!item)return;
  if(field==='name')item.name=val;
  else item.spec=parseFloat(val)||1;
  save();
  const v=itemValue(item,mode);
  const el=document.getElementById('iv-'+mode+'-'+id);
  if(el){el.textContent=v>0?fmt(v):'—';el.className='item-val'+(v>0?'':' zero');}
  refreshInvCatTotal(mode,cat);
  updateHeaderTotal();
}
 
function delInvItem(mode,cat,id){
  const ref=mode==='cart'?S.cartItems:S.stockItems;
  ref[cat]=(ref[cat]||[]).filter(i=>i.id!==id);
  save();reRenderInvSec(mode,cat);updateHeaderTotal();showSnack('已刪除品項');
}
 
function refreshInvCatTotal(mode,cat){
  const items=mode==='cart'?(S.cartItems[cat]||[]):(S.stockItems[cat]||[]);
  const t=items.reduce((s,i)=>s+itemValue(i,mode),0);
  const el=document.getElementById(`${mode}-ct-${cat}`);
  if(el)el.textContent=fmt(t);
}
 
function reRenderInvSec(mode,cat){
  const items=mode==='cart'?S.cartItems[cat]:S.stockItems[cat];
  const old=document.getElementById(`sec-${mode}-${cat}`);
  if(!old)return;
  const newSec=makeInvSec(mode,cat,items||[]);
  old.replaceWith(newSec.querySelector('.sec-card'));
}
 
function addCat(mode){
  const inp=document.getElementById(mode+'-new-cat');
  const name=inp.value.trim();
  if(!name){showSnack('請輸入分類名稱');return;}
  const cats=mode==='cart'?S.cartCats:S.stockCats;
  if(cats.includes(name)){showSnack('分類已存在');return;}
  cats.push(name);
  const ref=mode==='cart'?S.cartItems:S.stockItems;
  if(!ref[name])ref[name]=[];
  save();inp.value='';
  if(mode==='cart')renderCart();else renderStock();
  showSnack('已新增分類：'+name);
}
 
function renameCat(mode,oldName,el){
  const newName=el.value.replace(/[【】]/g,'').trim();
  if(!newName||newName===oldName){el.value='【'+oldName+'】';return;}
  const cats=mode==='cart'?S.cartCats:S.stockCats;
  const idx=cats.indexOf(oldName);if(idx>=0)cats[idx]=newName;
  const ref=mode==='cart'?S.cartItems:S.stockItems;
  ref[newName]=ref[oldName]||[];delete ref[oldName];
  save();
  if(mode==='cart')renderCart();else renderStock();
  showSnack('已重新命名：'+newName);
}
 
let _dm='',_dc='';
function askDelCat(mode,cat){
  _dm=mode;_dc=cat;
  document.getElementById('modal-dc-title').textContent=`確定刪除「${cat}」分類？`;
  document.getElementById('modal-dc').classList.remove('hidden');
}
function closeModal(){document.getElementById('modal-dc').classList.add('hidden');}
function confirmDelCat(){
  closeModal();
  const cats=_dm==='cart'?S.cartCats:S.stockCats;
  const idx=cats.indexOf(_dc);if(idx>=0)cats.splice(idx,1);
  const ref=_dm==='cart'?S.cartItems:S.stockItems;
  delete ref[_dc];
  save();
  if(_dm==='cart')renderCart();else renderStock();
  updateHeaderTotal();showSnack('已刪除分類');
}
 
// ════════════════════════════════════════
// 商品管理
// ════════════════════════════════════════
function renderPrice(){
  const page=document.getElementById('page-price');
  page.innerHTML='';
  const cats=Object.keys(S.products);
  cats.forEach(cat=>{
    const items=S.products[cat]||[];
    const sec=document.createElement('div');
    sec.className='sec-wrap';
    const card=document.createElement('div');
    card.className='sec-card';
    const tableRows=items.map((p,idx)=>`
      <tr>
        <td><input value="${p.name}" oninput="pUpd('${cat}',${idx},'name',this.value)" style="min-width:120px"></td>
        <td><input type="number" inputmode="decimal" value="${p.price}" oninput="pUpd('${cat}',${idx},'price',this.value)" style="width:65px"></td>
        <td><input type="number" inputmode="decimal" value="${p.spec}" oninput="pUpd('${cat}',${idx},'spec',this.value)" style="width:60px"></td>
        <td><input value="${p.unit}" oninput="pUpd('${cat}',${idx},'unit',this.value)" style="width:42px"></td>
        <td class="cmp" id="ppg-${cat}-${idx}">${fmtpg(pgForProduct(p))}</td>
        <td><button class="btn-danger" onclick="pDel('${cat}',${idx})">刪除</button></td>
      </tr>`).join('');
    card.innerHTML=`
      <div class="sec-hdr"><input class="sec-title-inp" value="【${cat}】" readonly style="pointer-events:none"></div>
      <div class="ptw"><table class="pt">
        <thead><tr><th>品名</th><th>價格(元)</th><th>規格</th><th>單位</th><th>每克/件(元)</th><th></th></tr></thead>
        <tbody id="ptb-${cat}">${tableRows}</tbody>
      </table></div>
      <div class="add-form">
        <div class="add-form-title">＋ 新增品項到「${cat}」</div>
        <div class="add-form-row">
          <div class="field"><label>品名</label><input type="text" placeholder="例：新品（包）" id="pa-name-${cat}"></div>
          <div class="field" style="max-width:80px"><label>價格(元)</label><input type="number" inputmode="decimal" placeholder="0" id="pa-price-${cat}"></div>
          <div class="field" style="max-width:72px"><label>規格數量</label><input type="number" inputmode="decimal" placeholder="1" id="pa-spec-${cat}"></div>
          <div class="field" style="max-width:60px"><label>單位</label><input type="text" placeholder="克" id="pa-unit-${cat}"></div>
          <div class="field" style="max-width:60px"><label>製成率</label><input type="number" inputmode="decimal" placeholder="1" step="0.01" max="1" id="pa-yld-${cat}"></div>
        </div>
        <div><button class="btn btn-price btn-sm" onclick="pAdd('${cat}')">＋ 新增</button></div>
      </div>`;
    sec.appendChild(card);
    page.appendChild(sec);
  });
  // 新增分類
  const bar=document.createElement('div');
  bar.className='add-cat-bar';
  bar.innerHTML='<input class="add-cat-inp" type="text" placeholder="新商品類別名稱" id="price-new-cat"><button class="btn btn-price btn-sm" onclick="addPriceCat()">＋ 新增類別</button>';
  page.appendChild(bar);
}
 
function pUpd(cat,idx,field,val){
  const items=S.products[cat];if(!items||!items[idx])return;
  if(field==='name'||field==='unit')items[idx][field]=val;
  else items[idx][field]=parseFloat(val)||0;
  save();
  const el=document.getElementById(`ppg-${cat}-${idx}`);
  if(el)el.textContent=fmtpg(pgForProduct(items[idx]));
  updateHeaderTotal();
}
function pDel(cat,idx){
  if(!confirm('確定刪除此商品？刪除後攤車與現場庫存中同品項的盤點資料將失去成本參照。'))return;
  S.products[cat].splice(idx,1);
  save();renderPrice();showSnack('已刪除');
}
function pAdd(cat){
  const name=document.getElementById(`pa-name-${cat}`).value.trim();
  const price=parseFloat(document.getElementById(`pa-price-${cat}`).value)||0;
  const spec=parseFloat(document.getElementById(`pa-spec-${cat}`).value)||1;
  const unit=document.getElementById(`pa-unit-${cat}`).value.trim()||'克';
  const yld=parseFloat(document.getElementById(`pa-yld-${cat}`).value)||1;
  if(!name){showSnack('請填入品名');return;}
  if(!S.products[cat])S.products[cat]=[];
  S.products[cat].push({id:uid(),name,price,spec,unit,yld});
  save();renderPrice();showSnack('已新增：'+name);
}
function addPriceCat(){
  const inp=document.getElementById('price-new-cat');
  const name=inp.value.trim();
  if(!name){showSnack('請輸入類別名稱');return;}
  if(S.products[name]){showSnack('類別已存在');return;}
  S.products[name]=[];
  save();inp.value='';renderPrice();showSnack('已新增類別：'+name);
}
 
// ════════════════════════════════════════
// 列印
// ════════════════════════════════════════
function renderPrint(){
  const body=document.getElementById('sum-body');body.innerHTML='';
  let grand=0;
  function buildSec(label,cats,modeKey){
    let total=0;let html='';
    cats.forEach(cat=>{
      const items=modeKey==='cart'?(S.cartItems[cat]||[]):(S.stockItems[cat]||[]);
      let ct=0;let rows='';
      items.forEach(item=>{
        const v=itemValue(item,modeKey);
        if(v>0){rows+=`<div class="sum-row"><span class="sum-item-name">▸ ${item.name}</span><span class="sum-row-val">${fmt(v)}</span></div>`;ct+=v;}
      });
      if(ct>0){html+=`<div class="sum-row"><span style="font-size:12px;font-weight:700;color:var(--text2)">【${cat}】小計</span><span class="sum-row-val hi">${fmt(ct)}</span></div>${rows}`;total+=ct;}
    });
    grand+=total;
    const wrap=document.createElement('div');wrap.className='sec-wrap';
    const card=document.createElement('div');card.className='sec-card';
    card.innerHTML=`<div class="sec-hdr"><input class="sec-title-inp" value="${label}" readonly style="pointer-events:none"><div class="sec-total">${fmt(total)}</div></div>${html||'<div class="empty-hint">尚無資料</div>'}`;
    wrap.appendChild(card);body.appendChild(wrap);
  }
  buildSec('🛒 攤車庫存',S.cartCats,'cart');
  buildSec('📦 現場庫存',S.stockCats,'stock');
  document.getElementById('grand').textContent=fmt(grand);
  updateHeaderTotal();
}
 
function doPrint(){
  const now=new Date();
  const ts=`${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
  document.getElementById('pm').textContent='盤點時間：'+ts+'　麻的小辛辣 — 內部使用';
  renderPrint();
  setTimeout(()=>window.print(),100);
}
 
function exportExcel(){
  const now=new Date();
  const ts=`${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
  let rows=[
    ['麻的小辛辣｜庫存金額彙整報表'],['盤點時間：'+ts],[],
    ['區域','分類','品名','規格','數量','單位','金額(元)'],
  ];
  S.cartCats.forEach(cat=>(S.cartItems[cat]||[]).forEach(item=>{
    const p=findProduct(item.pid);
    const v=itemValue(item,'cart');
    rows.push(['攤車庫存',cat,item.name,item.spec,item.qty||0,p?p.unit:'—',Math.round(v)]);
  }));
  rows.push([]);
  S.stockCats.forEach(cat=>(S.stockItems[cat]||[]).forEach(item=>{
    const p=findProduct(item.pid);
    const v=itemValue(item,'stock');
    rows.push(['現場庫存',cat,item.name,item.spec,item.qty||0,p?p.unit:'—',Math.round(v)]);
  }));
  rows.push([]);rows.push(['','','','','','全店總計',Math.round(grandTotal())]);
  const csv='\uFEFF'+rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;
  a.download='麻的小辛辣_庫存_'+now.getFullYear()+String(now.getMonth()+1).padStart(2,'0')+String(now.getDate()).padStart(2,'0')+'.csv';
  a.click();URL.revokeObjectURL(url);
  showSnack('Excel 已下載');
}
 
// ── Snack ──
let _st;
function showSnack(msg){
  const el=document.getElementById('snack');el.textContent=msg;el.classList.add('show');
  clearTimeout(_st);_st=setTimeout(()=>el.classList.remove('show'),2200);
}
 
// ── 初始化 ──
load();renderCart();renderStock();renderPrice();updateHeaderTotal();
</script>
</body>
